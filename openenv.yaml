spec_version: 1
name: mindweave
description: "An RL-powered psychological support AI that utilizes Reinforcement Learning (PPO) to select optimal therapeutic response strategies based on user emotion and intent."
sdk: docker
app_port: 8000

tasks:
  - id: "emotion_classification"
    description: "Identifies the core emotion from user input (e.g., sad, anxious, neutral)."
    grader: "server.app:grade_emotion"

  - id: "intent_detection"
    description: "Determines if the user intent is emotional disclosure, a question, or a statement."
    grader: "server.app:grade_intent"

  - id: "agent_selection"
    description: "PPO-driven task to select between cognitive, behavioral, or emotional agents."
    grader: "server.app:grade_agent"
