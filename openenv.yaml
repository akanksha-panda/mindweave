spec_version: 1
name: mindweave
description: "An RL-powered psychological support AI."
sdk: docker
app_port: 8000
app: server.app:app

tasks:
  - id: "emotion_classification"
    description: "Identifies the core emotion from user input."
    grader: "server.grader:MindweaveGrader"

  - id: "intent_detection"
    description: "Determines if user intent is emotional, question, or statement."
    grader: "server.grader:MindweaveGrader"

  - id: "agent_selection"
    description: "PPO-driven selection between cognitive, behavioral, or emotional agents."
    grader: "server.grader:MindweaveGrader"
